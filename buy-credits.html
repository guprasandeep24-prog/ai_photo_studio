<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device wide, initial-scale=1.0">
    <title>Buy Credits | AI Photo Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center py-12 px-4">
    <h1 class="text-4xl font-extrabold mb-4 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">Upgrade Your Credits</h1>
    <p class="text-gray-400 mb-12 text-center">Select a plan to power up your AI creations.</p>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 w-full max-w-4xl">
        <div class="bg-gray-800 border border-gray-700 p-8 rounded-3xl shadow-xl text-center">
            <h2 class="text-2xl font-bold mb-2">Starter Pack</h2>
            <div class="text-4xl font-black text-blue-400 mb-4">₹499</div>
            <button onclick="purchasePlan('STARTER')" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-bold transition">Buy Starter</button>
        </div>
        <div class="bg-gray-800 border-2 border-purple-500 p-8 rounded-3xl shadow-xl text-center">
            <h2 class="text-2xl font-bold mb-2">Pro Pack</h2>
            <div class="text-4xl font-black text-purple-400 mb-4">₹999</div>
            <button onclick="purchasePlan('PRO')" class="w-full bg-purple-600 hover:bg-purple-500 py-3 rounded-xl font-bold transition">Buy Pro</button>
        </div>
    </div>
    <p id="status" class="mt-8 text-gray-500"></p>
    <a href="dashboard.html" class="mt-4 text-blue-400 hover:underline">← Back to Dashboard</a>

    <script type="module">
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        const firebaseConfig = { apiKey: "AIzaSyAB5Q7-Sj4rfBAeOT9iDJPpEAIR6JLRhDA", authDomain: "ai-photo-studio-a8a34.firebaseapp.com", projectId: "ai-photo-studio-a8a34", storageBucket: "ai-photo-studio-a8a34.firebasestorage.app", messagingSenderId: "416743083671", appId: "1:416743083671:web:7733f0cb7a6af8c8667a3d2" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const BASE_URL = "https://ai-photo-studio-e3so.onrender.com";

        window.purchasePlan = async (planName) => {
            const user = auth.currentUser;
            if (!user) return alert("Please login first!");
            const status = document.getElementById('status');
            status.innerText = "🔄 Creating order...";

            try {
                const res = await fetch(`${BASE_URL}/api/payments/create-order`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ planName })
                });
                const orderData = await res.json();
                if (!orderData.success) throw new Error(orderData.error);

                const options = {
                    "key": "rzp_test_T0igS1UI99gp4v", 
                    "amount": orderData.amount * 100,
                    "currency": "INR",
                    "name": "AI Photo Studio",
                    "order_id": orderData.orderId,
                    "handler": async (response) => {
                        status.innerText = "🛡️ Verifying...";
                        const verifyRes = await fetch(`${BASE_URL}/api/payments/verify-payment`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                razorpay_order_id: response.razorpay_order_id,
                                razorpay_payment_id: response.razorpay_payment_id,
                                razorpay_signature: response.razorpay_signature,
                                planName: planName,
                                firebaseUid: user.uid
                            })
                        });
                        if ((await verifyRes.json()).success) {
                            alert("Success!"); window.location.href = 'dashboard.html';
                        } else { alert("Failed!"); }
                    }
                };
                new Razorpay(options).open();
            } catch (e) { alert(e.message); }
        };
    </script>
</body>
</html>
