<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy Credits | AI Photo Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center py-12 px-4">
    <h1 class="text-4xl font-extrabold mb-4 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">Upgrade Your Credits</h1>
    <p class="text-gray-400 mb-12 text-center">Select a plan to power up your AI creations.</p>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 w-full max-w-4xl">
        <!-- Starter Plan -->
        <div class="bg-gray-800 border border-gray-700 p-8 rounded-3xl shadow-xl text-center hover:border-blue-500 transition duration-300">
            <h2 class="text-2xl font-bold mb-2">Starter Pack</h2>
            <p class="text-gray-400 text-sm mb-4">5 AI Photos</p>
            <div class="text-4xl font-black text-blue-400 mb-4">₹499</div>
            <button onclick="purchasePlan('STARTER')" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-bold transition">Buy Starter</button>
        </div>

        <!-- Pro Plan -->
        <div class="bg-gray-800 border-2 border-purple-500 p-8 rounded-3xl shadow-xl text-center hover:scale-105 transition duration-300">
            <h2 class="text-2xl font-bold mb-2">Pro Pack</h2>
            <p class="text-gray-400 text-sm mb-4">15 AI Photos</p>
            <div class="text-4xl font-black text-purple-400 mb-4">₹999</div>
            <button onclick="purchasePlan('PRO')" class="w-full bg-purple-600 hover:bg-purple-500 py-3 rounded-xl font-bold transition">Buy Pro</button>
        </div>
    </div>

    <p id="status" class="mt-8 text-blue-400 font-medium"></p>
    <a href="dashboard.html" class="mt-4 text-gray-400 hover:text-white transition">← Back to Dashboard</a>

    <script type="module">
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyAB5Q7-Sj4rfBAeOT9iDJPpEAIR6JLRhDA", 
            authDomain: "ai-photo-studio-a8a34.firebaseapp.com", 
            projectId: "ai-photo-studio-a8a34", 
            storageBucket: "ai-photo-studio-a8a34.firebasestorage.app", 
            messagingSenderId: "416743083671", 
            appId: "1:416743083671:web:7733f0cb7a6af8c8667a3d2" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // ✅ FIXED URL (With -studio)
        const BASE_URL = "https://ai-photo-studio-e3so.onrender.com";

        window.purchasePlan = async (planName) => {
            const user = auth.currentUser;
            if (!user) return alert("Please login first!");

            const status = document.getElementById('status');
            status.innerText = "🔄 Initializing Secure Payment...";

            try {
                // 1. Create Order on Backend
                // Added userId here so backend knows who is buying
                const res = await fetch(`${BASE_URL}/api/payments/create-order`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        planName: planName,
                        userId: user.uid 
                    })
                });

                const orderData = await res.json();
                if (!orderData.success) throw new Error(orderData.error || "Failed to create order");

                // 2. Open Razorpay Checkout
                const options = {
                    "key": "rzp_test_T0igS1UI99gp4v", // Your Razorpay Test Key
                    "amount": orderData.amount * 100, // Amount in paise
                    "currency": "INR",
                    "name": "AI Photo Studio",
                    "description": `Purchase ${planName} Plan`,
                    "order_id": orderData.orderId,
                    "handler": async (response) => {
                        status.innerText = "🛡️ Verifying Payment...";
                        
                        // 3. Verify Payment on Backend
                        const verifyRes = await fetch(`${BASE_URL}/api/payments/verify-payment`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                razorpay_order_id: response.razorpay_order_id,
                                razorpay_payment_id: response.razorpay_payment_id,
                                razorpay_signature: response.razorpay_signature,
                                planName: planName,
                                firebaseUid: user.uid
                            })
                        });

                        const verifyData = await verifyRes.json();
                        if (verifyData.success) {
                            status.innerText = "✅ Success! Redirecting...";
                            alert("Payment Successful! Your credits have been added.");
                            window.location.href = 'dashboard.html';
                        } else { 
                            throw new Error(verifyData.error || "Verification failed!"); 
                        }
                    },
                    "prefill": {
                        "email": user.email
                    },
                    "theme": {
                        "color": "#4f46e5"
                    }
                };

                const rzp = new window.Razorpay(options);
                rzp.open();

            } catch (e) { 
                console.error(e);
                status.innerText = "❌ Error: " + e.message;
                alert("Error: " + e.message); 
            }
        };
    </script>
</body>
</html>
