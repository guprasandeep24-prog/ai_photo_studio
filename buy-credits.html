<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy Credits | AI Photo Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center py-12 px-4">

    <h1 class="text-4xl font-extrabold mb-4 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">
        Upgrade Your Credits
    </h1>
    <p class    class="text-gray-400 mb-12 text-center">Select a plan to power up your AI creations.</p>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 w-full max-w-4xl">
        
        <!-- Plan 1: Starter -->
        <div class="bg-gray-800 border border-gray-700 p-8 rounded-3xl shadow-xl flex flex-col items-center text-center">
            <h2 class="text-2xl font-bold mb-2">Starter Pack</h2>
            <div class="text-4xl font-black text-blue-400 mb-4">₹499</div>
            <ul class="text-gray-400 mb-8 space-y-2">
                <li><i class="fas fa-check text-green-500 mr-2"></i> 40 AI Credits</li>
                <li><i class="fas fa-check text-green-500 mr-2"></i> High Quality Output</li>
                <li><i class="fas fa-check text-green-500 mr-2"></i> Standard Support</li>
            </ul>
            <button onclick="purchasePlan('STARTER')" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-bold transition">Buy Starter</button>
        </div>

        <!-- Plan 2: Pro -->
        <div class="bg-gray-800 border-2 border-purple-500 p-8 rounded-3xl shadow-xl flex flex-col items-center text-center relative overflow-hidden">
            <div class="absolute top-0 right-0 bg-purple-500 text-white text-[10px] font-bold px-3 py-1 rounded-bl-lg uppercase">Best Value</div>
            <h2 class="text-2xl font-bold mb-2">Pro Pack</h2>
            <div class="text-4xl font-black text-purple-400 mb-4">₹999</div>
            <ul class="text-gray-400 mb-8 space-y-2">
                <li><i class="fas fa-check text-green-500 mr-2"></i> 90 AI Credits</li>
                <li><i class="fas fa-check text-green-500 mr-2"></i> Priority Processing</li>
                <li><i class="fas fa-check text-green-500 mr-2"></i> Premium Support</li>
            </ul>
            <button onclick="purchasePlan('PRO')" class="w-full bg-purple-600 hover:bg-purple-500 py-3 rounded-xl font-bold transition">Buy Pro</button>
        </div>

    </div>

    <p id="status" class="mt-8 text-gray-500"></p>
    <a href="dashboard.html" class="mt-4 text-blue-400 hover:underline text-sm">← Back to Dashboard</a>

    <script>
        // ⚠️ IMPORTANT: YAHAN APNA USER ID DAALEIN (Wahi jo dashboard mein use kiya tha)
        const MY_USER_ID = "nSVQauCvs7SvzNXKh30sqkpu3xB3";

        async function purchasePlan(planName) {
            const status = document.getElementById('status');
            status.innerText = "🔄 Creating order...";
            status.className = "mt-8 text-blue-400";

            try {
                // 1. Backend se Order ID mangwana
                const res = await fetch('https://ai-photo-e3so.onrender.com/api/payments/create-order', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ planName: planName })
                });

                const orderData = await res.json();
                if (!orderData.success) throw new Error(orderData.error);

                // 2. Razorpay Popup kholna
                const options = {
                    "key": "rzp_test_T0igS1UI99gp4v", // <-- APNI TEST KEY YAHAN DAALEIN
                    "amount": orderData.amount * 100,
                    "currency": "INR",
                    "name": "AI Photo Studio",
                    "description": `${planName} Plan`,
                    "order_id": orderData.orderId,
                    "handler": async function (response) {
                        status.innerText = "🛡️ Verifying payment...";
                        
                        // 3. Payment Verify karna
                        const verifyRes = await fetch('https://ai-photo-e3so.onrender.com/api/payments/verify-payment', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                razorpay_order_id: response.razorpay_order_id,
                                razorpay_payment_id: response.razorpay_payment_id,
                                razorpay_signature: response.razorpay_signature,
                                planName: planName,
                                firebaseUid: MY_USER_ID
                            })
                        });

                        const verifyData = await verifyRes.json();
                        if (verifyData.success) {
                            status.innerText = "✅ Success! Redirecting...";
                            status.className = "mt-8 text-green-400";
                            setTimeout(() => { window.location.href = 'dashboard.html'; }, 2000);
                        } else {
                            throw new Error("Verification failed!");
                        }
                    },
                    "prefill": { "name": "Test User", "email": "test@example.com" },
                    "theme": { "color": "#2563eb" }
                };

                const rzp = new Razorpay(options);
                rzp.open();

            } catch (err) {
                status.innerText = "❌ Error: " + err.message;
                status.className = "mt-8 text-red-400";
            }
        }
    </script>
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</body>
</html>
