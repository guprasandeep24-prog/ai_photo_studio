<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Photo Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .category-card:hover { transform: translateY(-8px); transition: all 0.3s ease; }
        .gender-btn.active { background-color: #4f46e5; color: white; border-color: #4f46e5; }
        .comparison-container { position: relative; width: 100%; height: 350px; overflow: hidden; border-radius: 1.5rem; }
        .before-image { position: absolute; top: 0; left: 0; width: 50%; height: 100%; overflow: hidden; z-index: 10; border-right: 3px solid white; }
        .before-image img, .after-image img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .slider-input { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; cursor: ew-resize; z-index: 30; }
        .slider-handle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40px; height: 40px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #4f46e5; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 20; pointer-events: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <nav class="container mx-auto px-6 py-6 flex justify-between items-center">
        <div class="text-2xl font-bold text-indigo-600">AI <span class="text-slate-800">PhotoStudio</span></div>
        <div id="auth-buttons">
            <button id="loginBtn" class="bg-indigo-600 text-white px-6 py-2 rounded-full font-bold">Login / Sign Up</button>
        </div>
        <div id="user-profile" class="hidden flex items-center gap-4">
            <div class="flex items-center gap-2 bg-indigo-50 px-3 py-1 rounded-full border border-indigo-100">
                <i class="fa-solid fa-coins text-yellow-500"></i><span id="user-credits" class="text-sm font-bold text-indigo-700">0</span>
            </div>
            <button onclick="togglePricingModal()" class="bg-amber-500 text-white px-4 py-1.5 rounded-full text-sm font-bold">Get Credits</button>
            <span id="user-email" class="text-sm font-medium text-slate-600"></span>
            <button id="logoutBtn" class="text-sm text-red-500 font-bold">Logout</button>
        </div>
    </nav>

    <header class="container mx-auto px-6 py-12 text-center">
        <h1 class="text-4xl md:text-6xl font-extrabold mb-6">Professional Photos in <span class="text-indigo-600">Seconds</span></h1>
    </header>

    <section id="dashboard-section" class="hidden container mx-auto px-6 py-10">
        <div class="flex justify-between items-end mb-8">
            <div><h2 class="text-3xl font-bold">My AI Gallery</h2></div>
            <button onclick="showUploadSection()" class="bg-indigo-600 text-white px-6 py-2 rounded-xl font-bold">Create New</button>
        </div>
        <div id="photo-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6">
            <p id="no-photos-msg" class="col-span-full text-center text-slate-400 py-10">No photos yet.</p>
        </div>
    </section>

    <section id="categories-section" class="container mx-auto px-6 py-10">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div onclick="selectCategory('linkedin')" class="category-card cursor-pointer bg-white p-8 rounded-3xl shadow text-center"><h3>LinkedIn</h3></div>
            <div onclick="selectCategory('wedding')" class="category-card cursor-pointer bg-white p-8 rounded-3xl shadow text-center"><h3>Wedding</h3></div>
            <div onclick="selectCategory('fashion')" class="category-card cursor-pointer bg-white p-8 rounded-3xl shadow text-center"><h3>Fashion</h3></div>
        </div>
    </section>

    <section id="upload-section" class="hidden container mx-auto px-6 py-12">
        <div class="max-w-xl mx-auto bg-white p-10 rounded-3xl shadow-2xl text-center">
            <button onclick="showUploadSection()" class="float-right text-slate-400"><i class="fa-solid fa-arrow-left"></i></button>
            <h2 id="selected-cat-title" class="text-2xl font-bold mb-6 text-indigo-600 pt-4">Upload</h2>
            <div class="flex justify-center gap-4 mb-8">
                <button id="btn-mode-faceswap" onclick="setMode('faceswap')" class="text-xs font-bold px-4 py-2 rounded-full bg-indigo-600 text-white">Face-Swap</button>
                <button id="btn-mode-prompt" onclick="setMode('prompt')" class="text-xs font-bold px-4 py-2 rounded-full bg-slate-100 text-slate-600">Magic Prompt</button>
            </div>
            <div id="faceswap-elements" class="space-y-8">
                <div class="flex justify-center gap-4">
                    <button onclick="selectGender('man')" id="btn-man" class="gender-btn w-28 py-2 border-2 rounded-xl font-bold">Man</button>
                    <button onclick="selectGender('woman')" id="btn-woman" class="gender-btn w-28 py-2 border-2 rounded-xl font-bold">Woman</button>
                </div>
                <div id="preview-container" class="hidden"><img id="imagePreview" class="w-40 h-40 object-cover mx-auto rounded-2xl border-4 border-indigo-50"></div>
                <input type="file" id="imageInput" class="hidden" accept="image/*">
                <button onclick="document.getElementById('imageInput').click()" class="w-full bg-slate-100 py-4 rounded-2xl font-bold">Choose Image</button>
            </div>
            <div id="prompt-elements" class="hidden"><textarea id="promptInput" rows="4" class="w-full px-4 py-3 rounded-xl border outline-none" placeholder="Describe..."></textarea></div>
            <button id="submitBtn" class="w-full mt-8 bg-indigo-600 text-white py-4 rounded-2xl font-bold text-lg">Generate</button>
        </div>
    </section>

    <!-- Modals -->
    <div id="pricingModal" class="fixed inset-0 bg-slate-900/90 hidden flex items-center justify-center z-[200] p-4">
        <div class="bg-white rounded-[2.5rem] p-10 w-full max-w-4xl relative">
            <button onclick="togglePricingModal()" class="absolute top-6 right-6 text-slate-400"><i class="fas fa-times text-xl"></i></button>
            <h3 class="text-xl font-bold mb-8">Select a Plan</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div onclick="startPayment(499, 50)" class="border p-6 rounded-3xl cursor-pointer"><h4>Starter</h4><div class="text-2xl font-bold">₹499 (50 Credits)</div></div>
                <div onclick="startPayment(999, 120)" class="border-2 border-indigo-500 p-6 rounded-3xl cursor-pointer"><h4>Pro</h4><div class="text-2xl font-bold">₹999 (120 Credits)</div></div>
            </div>
        </div>
    </div>

    <div id="loadingModal" class="fixed inset-0 bg-slate-900/80 hidden flex items-center justify-center z-50">
        <div class="bg-white p-10 rounded-3xl text-center"><div class="animate-spin rounded-full h-12 w-12 border-4 border-indigo-600 border-t-transparent mx-auto mb-4"></div><p>AI is working...</p></div>
    </div>

    <div id="successModal" class="fixed inset-0 bg-slate-900/90 hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white p-6 rounded-[2rem] text-center max-w-sm w-full">
            <h2 class="text-2xl font-bold mb-4">Magic Done!</h2>
            <div class="relative mb-6">
                <div class="comparison-container">
                    <div class="after-image w-full h-full"><img id="resultImage" src="" class="w-full h-full object-cover rounded-2xl"></div>
                    <div id="beforeImageWrapper" class="before-image"><img id="originalImagePreview" src="" class="w-full h-full object-cover rounded-2xl"></div>
                    <input type="range" id="comparisonSlider" class="slider-input" min="0" max="100" value="50">
                    <div id="sliderHandle" class="slider-handle"><i class="fa-solid fa-arrows-left-right"></i></div>
                </div>
            </div>
            <div class="flex flex-col gap-3">
                <a id="downloadBtn" href="#" download class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold">Download</a>
                <button onclick="location.reload()" class="w-full bg-slate-100 py-3 rounded-xl font-bold">Try Another</button>
            </div>
        </div>
    </div>

    <div id="authModal" class="fixed inset-0 bg-slate-900/80 hidden flex items-center justify-center z-[100] p-4">
        <div class="bg-white p-8 rounded-[2rem] w-full max-w-md relative">
            <button onclick="toggleAuthModal()" class="absolute top-4 right-4 text-slate-400"><i class="fa-solid fa-xmark text-xl"></i></button>
            <h2 id="auth-title" class="text-3xl font-bold text-center mb-8">Login</h2>
            <form id="authForm" class="space-y-4">
                <input type="email" id="authEmail" required class="w-full px-4 py-3 rounded-xl border" placeholder="Email">
                <input type="password" id="authPassword" required class="w-full px-4 py-3 rounded-xl border" placeholder="Password">
                <button type="submit" id="authSubmitBtn" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold mt-4">Login</button>
            </form>
            <button id="auth-switch-btn" class="w-full mt-6 text-indigo-600 font-bold">Create Account</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAB5Q7-Sj4rfBAeOT9iDJPpEAIR6JLRhDA",
            authDomain: "ai-photo-studio-a8a34.firebaseapp.com",
            projectId: "ai-photo-studio-a8a34",
            storageBucket: "ai-photo-studio-a8a34.firebasestorage.app",
            messagingSenderId: "416743083671",
            appId: "1:416743083671:web:7733f0cb7a6af8c8667a3d2"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const BASE_URL = "https://ai-photo-studio-e3so.onrender.com"; 

        window.selectedCategory = ""; window.selectedGender = ""; window.selectedFile = null; window.originalImageUrl = ""; window.isLoginMode = true; window.currentMode = 'faceswap';

        window.toggleAuthModal = () => document.getElementById('authModal').classList.toggle('hidden');
        window.togglePricingModal = () => document.getElementById('pricingModal').classList.toggle('hidden');
        window.showUploadSection = () => { document.getElementById('upload-section').classList.remove('hidden'); document.getElementById('categories-section').classList.remove('hidden'); document.getElementById('dashboard-section').classList.add('hidden'); };
        
        window.switchAuthMode = () => {
            window.isLoginMode = !window.isLoginMode;
            document.getElementById('auth-title').innerText = window.isLoginMode ? "Login" : "Sign Up";
            document.getElementById('authSubmitBtn').innerText = window.isLoginMode ? "Login" : "Sign Up";
            document.getElementById('auth-switch-btn').innerText = window.isLoginMode ? "Create Account" : "Back to Login";
        };

        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPassword').value;
            try {
                if (window.isLoginMode) {
                    await signInWithEmailAndPassword(auth, email, password);
                } else {
                    const res = await createUserWithEmailAndPassword(auth, email, password);
                    await fetch(`${BASE_URL}/register`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ email: res.user.email, firebaseUid: res.user.uid })
                    });
                }
                toggleAuthModal();
            } catch (e) { alert(e.message); }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth).then(() => location.reload()));
        document.getElementById('loginBtn').addEventListener('click', toggleAuthModal);
        document.getElementById('auth-switch-btn').addEventListener('click', switchAuthMode);

        window.selectCategory = (cat) => {
            window.selectedCategory = cat;
            window.setMode('faceswap');
            document.getElementById('upload-section').classList.remove('hidden');
            document.getElementById('categories-section').classList.add('hidden');
            document.getElementById('dashboard-section').classList.add('hidden');
            document.getElementById('selected-cat-title').innerText = cat.toUpperCase();
        };

        window.setMode = (mode) => {
            window.currentMode = mode;
            document.getElementById('prompt-elements').classList.toggle('hidden', mode !== 'prompt');
            document.getElementById('faceswap-elements').classList.toggle('hidden', mode !== 'faceswap');
            document.getElementById('btn-mode-faceswap').className = mode === 'faceswap' ? 'text-xs font-bold px-4 py-2 rounded-full bg-indigo-600 text-white' : 'text-xs font-bold px-4 py-2 rounded-full bg-slate-100 text-slate-600';
            document.getElementById('btn-mode-prompt').className = mode === 'prompt' ? 'text-xs font-bold px-4 py-2 rounded-full bg-indigo-600 text-white' : 'text-xs font-bold px-4 py-2 rounded-full bg-slate-100 text-slate-600';
        };

        window.selectGender = (g) => {
            window.selectedGender = g;
            document.getElementById('btn-man').classList.toggle('active', g === 'man');
            document.getElementById('btn-woman').classList.toggle('active', g === 'woman');
        };

        document.getElementById('imageInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                window.selectedFile = file;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    document.getElementById('imagePreview').src = ev.target.result;
                    window.originalImageUrl = ev.target.result;
                    document.getElementById('preview-container').classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('submitBtn').addEventListener('click', async function() {
            const user = auth.currentUser;
            if (!user) return alert("Login first!");
            const formData = new FormData();
            formData.append('userId', user.uid);
            formData.append('email', user.email);
            formData.append('mode', window.currentMode);
            formData.append('category', window.selectedCategory);
            formData.append('gender', window.selectedGender);
            formData.append('prompt', document.getElementById('promptInput').value);
            if (window.selectedFile) formData.append('image', window.selectedFile);

            document.getElementById('loadingModal').classList.remove('hidden');

            try {
                const res = await fetch(`${BASE_URL}/upload`, { method: 'POST', body: formData });
                const data = await res.json();
                if (data.success) {
                    document.getElementById('resultImage').src = data.ai_image_url;
                    const beforeWrapper = document.getElementById('beforeImageWrapper');
                    const slider = document.getElementById('comparisonSlider');
                    const handle = document.getElementById('sliderHandle');

                    if (window.currentMode === 'prompt' || !data.original_image_url) {
                        beforeWrapper.classList.add('hidden');
                        slider.classList.add('hidden');
                        handle.classList.add('hidden');
                    } else {
                        beforeWrapper.classList.remove('hidden');
                        slider.classList.remove('hidden');
                        handle.classList.remove('hidden');
                        document.getElementById('originalImagePreview').src = data.original_image_url;
                        slider.oninput = (e) => {
                            beforeWrapper.style.width = `${e.target.value}%`;
                            handle.style.left = `${e.target.value}%`;
                        };
                    }
                    document.getElementById('downloadBtn').href = data.ai_image_url;
                    document.getElementById('successModal').classList.remove('hidden');
                    document.getElementById('loadingModal').classList.add('hidden');
                } else {
                    throw new Error(data.error || "Failed");
                }
            } catch (e) {
                alert(e.message);
                document.getElementById('loadingModal').classList.add('hidden');
            }
        });

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('auth-buttons').classList.add('hidden');
                document.getElementById('user-profile').classList.remove('hidden');
                document.getElementById('user-email').innerText = user.email;
                document.getElementById('dashboard-section').classList.remove('hidden');
                document.getElementById('categories-section').classList.add('hidden');
                const res = await fetch(`${BASE_URL}/user-profile/${user.uid}`);
                const data = await res.json();
                if(data.success) document.getElementById('user-credits').innerText = data.credits;
                fetchPhotos(user.uid);
            } else {
                document.getElementById('auth-buttons').classList.remove('hidden');
                document.getElementById('user-profile').classList.add('hidden');
                document.getElementById('dashboard-section').classList.add('hidden');
                document.getElementById('categories-section').classList.remove('hidden');
            }
        });

        async function fetchPhotos(uid) {
            const res = await fetch(`${BASE_URL}/my-photos?userId=${uid}`);
            const photos = await res.json();
            const grid = document.getElementById('photo-grid');
            if(photos.length > 0) {
                document.getElementById('no-photos-msg').classList.add('hidden');
                grid.innerHTML = "";
                photos.forEach(p => {
                    const div = document.createElement('div');
                    div.innerHTML = `<img src="${p.aiImageUrl}" class="rounded-xl shadow-lg w-full h-64 object-cover">`;
                    grid.appendChild(div);
                });
            }
        }

        window.startPayment = async (amount, credits) => {
            const user = auth.currentUser;
            if (!user) return alert("Login first!");
            try {
                const res = await fetch(`${BASE_URL}/api/payments/create-order`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ amount, userId: user.uid })
                });
                const data = await res.json();
                new Razorpay({
                    key: "rzp_test_T0igS1UI99gp4v",
                    amount: amount * 100,
                    currency: "INR",
                    name: "AI Photo Studio",
                    order_id: data.order.id,
                    handler: async function (res) {
                        const v = await fetch(`${BASE_URL}/api/payments/verify-payment`, {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({
                                razorpay_order_id: res.razorpay_order_id,
                                razorpay_payment_id: res.razorpay_payment_id,
                                razorpay_signature: res.razorpay_signature,
                                userId: user.uid,
                                email: user.email,
                                creditsToAdd: credits
                            })
                        });
                        const vd = await v.json();
                        if (vd.success) { alert("Success!"); location.reload(); }
                    },
                    prefill: { email: user.email },
                    theme: { color: "#4f46e5" }
                }).open();
            } catch (e) { alert(e.message); }
        };
    </script>
</body>
</html>
